name: Code Quality

on:
  workflow_dispatch:

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Run clang-format
        run: |
          find include tests -type f \( -name '*.hpp' -o -name '*.h' -o -name '*.cpp' -o -name '*.cc' -o -name '*.cxx' \) \
            -exec clang-format --dry-run --Werror {} +

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y clang-tidy

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Generate compile_commands.json
        run: xmake project -y -k compile_commands build

      - name: Run clang-tidy
        run: |
          find include tests -type f \( -name '*.hpp' -o -name '*.h' -o -name '*.cpp' \) -print0 \
            | xargs -0 -P "$(nproc)" clang-tidy -p build
